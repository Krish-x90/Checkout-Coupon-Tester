<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout Coupon Tester</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="header">
    <h1>Coupon Tester</h1>
  </div>
  
  <div id="main-view" class="view active">
    <div id="status-container">
      <p id="status-text">Detecting checkout page...</p>
      <div id="progress-bar-container" class="hidden">
        <div id="progress-bar"></div>
      </div>
    </div>
    
    <button id="test-btn" class="primary-btn" disabled>Test Codes</button>
    
    <div id="result-container" class="hidden">
      <h3>Result:</h3>
      <p id="result-text"></p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
